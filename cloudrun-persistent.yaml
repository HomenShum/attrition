apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: attrition
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containers:
        - image: gcr.io/nodebenchai/attrition
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: BP_PORT
              value: "8080"
            - name: BP_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: attrition-data
              mountPath: /data
      volumes:
        - name: attrition-data
          csi:
            driver: gcsfuse.run.googleapis.com
            readOnly: false
            volumeAttributes:
              bucketName: attrition-data-nodebenchai
