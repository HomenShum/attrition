name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.86"
      - run: cargo check --workspace
      - name: Frontend type-check
        working-directory: frontend
        run: |
          npm ci
          npx tsc --noEmit
