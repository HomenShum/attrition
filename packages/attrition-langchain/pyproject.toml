[project]
name = "attrition-langchain"
version = "0.1.0"
description = "Attrition workflow judge as LangChain tools — scan URLs, judge workflow completeness"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "NodeBench", email = "hello@nodebenchai.com"}]
keywords = ["ai", "agent", "langchain", "qa", "workflow", "judge"]
dependencies = [
    "langchain-core>=0.3",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-asyncio>=0.23"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
